<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Калькулятор ППС/NGT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Калькулятор ППС/NGT</h1>
        
        <label>Выберите тип расчета:</label>
        <select id="calcType">
            <option value="pps">ППС</option>
            <option value="ngt">NGT-3</option>
            <option value="both">Оба</option>
        </select>

        <div id="ppsSection">
            <h3>ППС</h3>
            <label>Объем ППС (м³):</label>
            <input type="number" id="ppsVolume" value="50" step="0.1">
            
            <label>Объем NGT (м³):</label>
            <input type="number" id="ngtVolume" value="50" step="0.1">
            
            <label>Сколько приготовить ППС (м³):</label>
            <input type="number" id="ppsToPrepare" value="100" step="0.1">
        </div>

        <div id="ngtSection">
            <h3>NGT-3</h3>
            <label>Сколько приготовить NGT (м³):</label>
            <input type="number" id="ngtToPrepare" value="20" step="0.1">
        </div>

        <button onclick="calculate()">Рассчитать</button>

        <div id="results"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
